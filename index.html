<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarakahLink | Community Food Sharing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald-950: #011a14;
      --emerald-900: #022c22;
      --emerald-800: #064e3b;
      --gold-primary: #d97706;
      --gold-light: #fbbf24;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--emerald-950);
      color: #fdfcf9;
      overflow-x: hidden;
      margin: 0;
      /* Use contain to isolate paint layers */
      contain: paint;
    }

    /* Static gradient — no animation, no layout cost */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 120% 80% at 0% 0%, rgba(16,185,129,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 100% 60% at 100% 100%, rgba(251,191,36,0.08) 0%, transparent 55%),
                  #011a14;
      z-index: -2;
      pointer-events: none;
    }

    /* Subtle lattice — CSS-only, no JS, no animation */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0L43 37L80 40L43 43L40 80L37 43L0 40L37 37Z' fill='%23fbbf24' fill-opacity='0.025'/%3E%3C/svg%3E");
      opacity: 1;
      pointer-events: none;
      z-index: -1;
    }

    .serif { font-family: 'Instrument Serif', serif; }

    /* Glassmorphism — reduced blur for performance */
    .celestial-glass {
      background: rgba(2, 44, 34, 0.45);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid rgba(251, 191, 36, 0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .glass-light {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* Map theming */
    .leaflet-container {
      border-radius: 4rem;
      filter: invert(100%) hue-rotate(180deg) brightness(0.88) contrast(1.05) saturate(0.75);
    }

    .text-glow-gold { text-shadow: 0 0 24px rgba(251,191,36,0.35); }

    /* Fade-up entrance */
    .fade-up {
      animation: fade-up-frames 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes fade-up-frames {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Skeleton shimmer */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.12); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(251,191,36,0.28); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
