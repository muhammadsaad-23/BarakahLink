
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barakat Meal | Sharing Blessings with Dignity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --emerald-900: #022c22;
      --emerald-800: #064e3b;
      --gold-metallic: #d97706;
      --gold-glow: #fbbf24;
      --parchment-white: #fdfcf9;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--parchment-white);
      color: #0f172a;
      overflow-x: hidden;
      margin: 0;
    }

    /* Sacred Mesh Background */
    .mesh-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(6, 78, 59, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(217, 119, 6, 0.05) 0%, transparent 50%),
                  var(--parchment-white);
      z-index: -2;
    }

    /* Geometric Lattice Overlay */
    .lattice-overlay {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 0l5 55 55 5-55 5-5 55-5-55-55-5 55-5z' fill='%23064e3b' fill-opacity='0.04' fill-rule='evenodd'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: -1;
    }

    /* Floating Barakah Orbs */
    .barakah-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.2;
      animation: float-celestial 25s infinite alternate ease-in-out;
    }

    @keyframes float-celestial {
      0% { transform: translate(-15%, -15%) scale(1); }
      100% { transform: translate(15%, 15%) scale(1.3); }
    }

    .serif { font-family: 'Instrument Serif', serif; }
    
    /* Global Input Visibility Fix */
    input, textarea, select { 
      color: #0f172a !important; 
      font-weight: 600;
    }

    /* Celestial Glassmorphism */
    .celestial-glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 15px 45px -10px rgba(6, 78, 59, 0.08);
    }

    .gold-shimmer {
      position: relative;
      overflow: hidden;
    }
    .gold-shimmer::after {
      content: '';
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      background: linear-gradient(45deg, transparent, rgba(251, 191, 36, 0.1), transparent);
      transform: rotate(45deg);
      animation: sweep-gold 6s infinite ease-in-out;
    }

    @keyframes sweep-gold {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }

    /* Staggered Entrance Animations */
    .animate-stagger-1 { animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-stagger-2 { animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; opacity: 0; }
    .animate-stagger-3 { animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; opacity: 0; }

    @keyframes slide-up {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .leaflet-container {
      border-radius: 3rem;
      filter: sepia(10%) contrast(105%);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="lattice-overlay"></div>
  <div class="barakah-orb w-[800px] h-[800px] bg-emerald-300 top-[-300px] left-[-300px]"></div>
  <div class="barakah-orb w-[600px] h-[600px] bg-amber-200 bottom-[-150px] right-[-150px]" style="animation-delay: -7s;"></div>
  <div id="root"></div>
</body>
</html>
